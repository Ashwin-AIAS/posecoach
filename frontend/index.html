<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0A0B0D" />
    <!-- PWA installability: standard tag + Apple's legacy tag (iOS still reads it).
         iOS ignores manifest icons entirely — apple-touch-icon below is the ONLY
         home-screen icon source on iPhone/iPad. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PoseCoach" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <!-- Apple's preferred size is 180×180; iOS scales 192 down cleanly. If a real
         icon-180.png is added to public/ later, point this at it. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
    <title>PoseCoach — AI Form Coach</title>
  </head>
  <body class="bg-surface-base">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
