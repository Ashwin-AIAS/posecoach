# PoseCoach — Production Docker Compose
#
# Differences from the dev compose (../docker-compose.yml):
#   * web tier  — NGINX serves the built React SPA + reverse-proxies /api /ws /chat
#   * backend   — no --reload, runs migrations on boot, --proxy-headers so the
#                 rate limiter keys on the real client IP behind NGINX
#   * secrets   — required vars fail loudly (${VAR:?...}); no insecure defaults
#   * no source bind-mounts — the image is the unit of deployment
#
# TLS: nginx/nginx.conf is HTTPS-only and expects Let's Encrypt certs at
#   /etc/letsencrypt/live/posecoach.yourdomain.com/. Mount real certs into the
#   web service (the ./deploy/certs volume below) before going live.
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml up --build -d

services:

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/letsencrypt:ro   # mount Let's Encrypt certs here
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000
             --proxy-headers --forwarded-allow-ips '*'"
    environment:
      POSTGRES_URL: postgresql+asyncpg://posecoach:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/posecoach
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?set OPENROUTER_API_KEY}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET (>=32 chars)}
      METRICS_TOKEN: ${METRICS_TOKEN:?set METRICS_TOKEN}
      # 640 ONNX (direct OnnxPoseSession path) — restores keypoint accuracy /
      # small-subject detection at mirror distance that the 320 model lost
      # (docs/enhancements/FIX_POSE_TRACKING_QUALITY.md §3A). Stays under the
      # 100 ms p95 gate; never fall back to 320 to claw back latency.
      MODEL_PATH: models/yolo_posecoach_v1.onnx
      CHROMA_PATH: data/chroma
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?set ALLOWED_ORIGINS}
      ENVIRONMENT: production
      RATE_LIMIT_ENABLED: "true"
    volumes:
      - ./../models:/app/models:ro    # YOLO weights (read-only in prod)
      - ./../data:/app/data           # ChromaDB + eval results
    expose:
      - "8000"                        # internal only — reached via the web tier
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: posecoach
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: posecoach
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posecoach"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    environment:
      METRICS_TOKEN: ${METRICS_TOKEN:?set METRICS_TOKEN}
    expose:
      - "9090"
    depends_on:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?set GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
