# PoseCoach — Development Docker Compose
# Usage: docker-compose up --build
# Production: see deploy/docker-compose.prod.yml

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: posecoach
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: posecoach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posecoach"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # Apply migrations before serving so a fresh Postgres volume has its tables
    # (otherwise auth/history 500 on first run). Idempotent — no-op once at head.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      # /app on the path so the `alembic` console script can import `app.*`
      # (env.py imports app.db/app.models) — without it, migrations ModuleNotFound.
      PYTHONPATH: /app
      POSTGRES_URL: postgresql+asyncpg://posecoach:dev_password@postgres:5432/posecoach
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      MODEL_PATH: models/yolo_posecoach_v1_320.onnx
      CHROMA_PATH: data/chroma
      ALLOWED_ORIGINS: http://localhost:5173
      ENVIRONMENT: development
      METRICS_TOKEN: ${METRICS_TOKEN:-dev_metrics_token_change_me}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app          # Live reload — source mounted
      - ./alembic:/app/alembic
      - ./models:/app/models    # YOLO weights
      - ./data:/app/data        # ChromaDB + eval results
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      # Mount the whole frontend dir so Vite sees index.html, vite.config.ts,
      # tsconfig, and the Tailwind config — not just src/public (otherwise Vite
      # 404s with "could not auto-determine entry point"). node_modules stays as
      # an anonymous volume so the image's installed deps aren't shadowed.
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./deploy/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    environment:
      METRICS_TOKEN: ${METRICS_TOKEN:-dev_metrics_token_change_me}
    ports:
      - "9090:9090"
    depends_on:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
