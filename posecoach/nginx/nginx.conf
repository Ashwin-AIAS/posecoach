# PoseCoach — NGINX Reverse Proxy
# Production only — dev uses Vite dev server directly
#
# CRITICAL: The /ws/ block MUST have these 3 lines for WebSocket to work:
#   proxy_http_version 1.1;
#   proxy_set_header Upgrade $http_upgrade;
#   proxy_set_header Connection "upgrade";
# Without them, WebSocket connections close after 60 seconds.

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  upstream backend {
    server backend:8000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ──────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS main server ──────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name posecoach.yourdomain.com;  # Replace with your domain

    ssl_certificate     /etc/letsencrypt/live/posecoach.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/posecoach.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self)" always;  # Allow camera for this origin only

    # ── Static frontend (React build) ───────────────────────
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;  # SPA fallback routing
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # ── REST API ────────────────────────────────────────────
    location /api/ {
      proxy_pass http://backend/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ── WebSocket endpoint (CRITICAL CONFIG) ────────────────
    location /ws/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;  # Required for WebSocket

      # These 2 headers are mandatory for WebSocket upgrade
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      # Long timeouts — WebSocket sessions can last 30+ minutes
      proxy_connect_timeout 7d;
      proxy_send_timeout    7d;
      proxy_read_timeout    7d;
    }

    # ── SSE Chat Stream ─────────────────────────────────────
    location /chat/stream {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";           # Keep-alive for SSE
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_buffering off;                      # Required for SSE streaming
      proxy_cache off;
      proxy_read_timeout 5m;                    # SSE streams can run for minutes
      chunked_transfer_encoding on;
    }

    # ── Prometheus metrics (protected) ─────────────────────
    location /metrics {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      # Add IP allowlist in production:
      # allow 10.0.0.0/8;
      # deny all;
    }
  }
}
